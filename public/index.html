<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Nexus Marketplace | Pro</title>
    <style>
        :root { --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; --primary: #8b5cf6; --border: #334155; }
        body { font-family: 'Inter', system-ui, sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .search-box { display: flex; gap: 10px; background: var(--card-bg); padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
        .section { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .card { background: #0f172a; padding: 15px; border-radius: 10px; border: 1px solid var(--border); text-align: center; }
        .sold { opacity: 0.6; filter: grayscale(1); }
        input { padding: 8px; background: #0f172a; border: 1px solid var(--border); color: white; border-radius: 4px; }
        button { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Nexus Marketplace ✨</h1>
            <div class="search-box">
                <input id="searchName" placeholder="חפש לפי שם...">
                <button onclick="searchProduct()">🔍</button>
            </div>
        </div>

        <section class="section">
            <h3>🛠️ הוספת קופון חדש</h3>
            <div style="display:flex; gap:10px;">
                <input id="name" placeholder="שם">
                <input id="cost" type="number" placeholder="עלות">
                <input id="margin" type="number" placeholder="רווח %">
                <input id="value" placeholder="קוד">
                <button onclick="addProduct()">הוסף</button>
            </div>
        </section>

        <div id="container" class="grid"></div>
    </div>

    <script>
        async function loadProducts() {
            const res = await fetch('/api/v1/products');
            const data = await res.json();
            render(data);
        }

        async function searchProduct() {
            const name = document.getElementById('searchName').value;
            if (!name) return loadProducts();
            
            const res = await fetch(`/api/v1/products/search/${name}`);
            if (!res.ok) {
                const errorData = await res.json();
                alert(`שגיאה: ${errorData.message || 'לא נמצאו תוצאות'}`);
                return;
            }
            const data = await res.json();
            if (data.length === 0) {
                alert("לא נמצאו קופונים בשם הזה.");
                document.getElementById('container').innerHTML = "<p style='text-align:center'>לא נמצאו תוצאות.</p>";
            } else {
                render(data);
            }
        }

        function render(data) {
            const container = document.getElementById('container');
            container.innerHTML = data.map(p => `
                <div class="card ${p.is_sold ? 'sold' : ''}">
                    <h4>${p.name}</h4>
                    <div style="font-weight:bold; color:var(--primary)">${p.price.toFixed(2)} ₪</div>
                    <p>${p.is_sold ? '🔒 נרכש' : '✅ זמין'}</p>
                    <button ${p.is_sold ? 'disabled' : ''} onclick="purchase('${p.id}', ${p.price})">רכוש</button>
                </div>
            `).join('');
        }

        async function purchase(id, price) {
            const res = await fetch(`/api/v1/products/${id}/purchase`, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer secret-token'},
                body: JSON.stringify({ reseller_price: price }) 
            });
            const result = await res.json();
            if (res.ok) {
                alert("נרכש! קוד: " + result.value);
            } else {
                alert("שגיאה: " + result.message + " (" + result.error_code + ")");
            }
            loadProducts();
        }

        async function addProduct() {
            const body = { 
                name: document.getElementById('name').value, 
                cost_price: parseFloat(document.getElementById('cost').value),
                margin_percentage: parseFloat(document.getElementById('margin').value), 
                value: document.getElementById('value').value 
            };
            await fetch('/api/admin/products', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            loadProducts();
        }
        
        loadProducts();
    </script>
</body>
</html>
