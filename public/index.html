<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Nexus Marketplace</title>
    <style>
        :root { 
            --bg: #0f172a; 
            --card-bg: #1e293b; 
            --text: #f8fafc; 
            --primary: #8b5cf6; 
            --border: #334155; 
        }
        body { font-family: 'Inter', system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 40px 20px; }
        .container { max-width: 900px; margin: auto; }
        h1 { text-align: center; margin-bottom: 30px; color: white; }
        
        /* Admin Panel */
        .admin-section { background: var(--card-bg); padding: 25px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 40px; }
        .form-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 15px; }
        input { padding: 12px; background: #0f172a; border: 1px solid var(--border); border-radius: 8px; color: white; }
        
        /* Product Grid */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid var(--border); text-align: center; }
        .card h3 { margin-top: 0; color: white; }
        .price { font-size: 1.2rem; font-weight: bold; color: var(--primary); margin: 10px 0; }
        
        button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; }
        button:hover { filter: brightness(1.1); }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Nexus Marketplace</h1>

        <section class="admin-section">
            <h3 style="margin-top:0">🛠️ Admin: יצירת מוצר</h3>
            <div class="form-group">
                <input id="name" placeholder="שם הקופון">
                <input id="cost" type="number" placeholder="עלות בסיס">
                <input id="margin" type="number" placeholder="אחוז רווח">
                <input id="value" placeholder="קוד קופון">
            </div>
            <button style="margin-top: 15px;" onclick="addProduct()">הוסף מוצר למערכת</button>
        </section>

        <div id="container" class="products-grid"></div>
    </div>

    <script>
        async function loadProducts() {
            const res = await fetch('/api/v1/products');
            const data = await res.json();
            const container = document.getElementById('container');
            container.innerHTML = data.length ? data.map(p => `
                <div class="card">
                    <h3>${p.name}</h3>
                    <div class="price">${p.price.toFixed(2)} ₪</div>
                    <button onclick="purchase('${p.id}')">רכוש קופון</button>
                </div>`).join('') : "<p style='text-align:center'>אין מוצרים זמינים כרגע.</p>";
        }

        async function addProduct() {
            const body = { 
                name: document.getElementById('name').value, 
                cost_price: parseFloat(document.getElementById('cost').value),
                margin_percentage: parseFloat(document.getElementById('margin').value), 
                value: document.getElementById('value').value 
            };
            await fetch('/api/admin/products', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            loadProducts();
        }

        async function purchase(id) {
            const res = await fetch(`/api/v1/products/${id}/purchase`, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer secret-token'},
                body: JSON.stringify({ reseller_price: 200 }) 
            });
            const result = await res.json();
            alert(res.ok ? "נרכש בהצלחה! קוד: " + result.value : "שגיאה: " + result.message);
            loadProducts();
        }
        loadProducts();
    </script>
</body>
</html>
